<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokedex</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body ng-app="pokedexApp">
  <div class="App" ng-controller="PokeDexController as vm">
    <img
      class="pokeball-back"
      id="pokeballBack"
      src="//hanashiro.github.io/pokedex/images/pokeball.svg"
      alt="background"
    >

    <input
      type="text"
      id="pokeFilter"
      placeholder="Search"
      ng-model="vm.searchText"
    />
    
    <ul class="poke-list" id="pokeList">
      <li class="poke-list-item" ng-repeat="pokemon in vm.pokemonList">
        <a href="#">
          <img
            ng-src="//serebii.net/pokedex-xy/icon/{{ pokemon.number }}.png"
            alt="Ícone do {{ pokemon.name }}"
          >
          <span>{{ pokemon.number }} - {{ pokemon.name }}</span>
        </a>
      </li>
    </ul>
  </div>

  <script
    src="http://cdnjs.cloudflare.com/ajax/libs/angular.js/1.6.4/angular.min.js" >
  </script>
  <script 
    src="http://cdnjs.cloudflare.com/ajax/libs/angular.js/1.6.4/angular-route.min.js" >
  </script>
  <script src="js/App.js" ></script>
  <script src="js/controllers/PokeDexController.js" ></script>
</body>
</html>
